<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherSync - Sign Up</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0a192f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .signup-container {
            background: radial-gradient(circle at top left, #1e3a5f 0%, #152a42 100%);
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 460px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .signup-header img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 4px;
        }

        .signup-welcome {
            color: #fff;
            margin: 0;
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: 0.3px;
            line-height: 1.1;
        }

        .signup-header h1 {
            color: #f1f5f9;
            margin: 6px 0 0;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .signup-header .signup-subtitle {
            color: #94a3b8;
            margin: 8px 0 0;
            font-size: 0.92rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.92rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 13px;
            border: 1px solid #334155;
            border-radius: 10px;
            font-size: 0.98rem;
            box-sizing: border-box;
            background-color: #0f172a;
            color: #fff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            border: 1px solid #fecaca;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-signup:hover {
            background-color: #2563eb;
        }

        .signin-row {
            margin-top: 14px;
            text-align: center;
            color: #94a3b8;
        }

        .signin-row a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .password-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-input-wrap input {
            padding-right: 46px;
        }

        .password-input-wrap input::-ms-reveal,
        .password-input-wrap input::-ms-clear {
            display: none;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="CipherSync">
            <p class="signup-welcome">Welcome!</p>
            <h1>Create Account</h1>
            <p class="signup-subtitle">Your username will appear on the dashboard after sign up.</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/signup" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="e.g. 09171234567" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-input-wrap">
                    <input type="password" id="password" name="password" required>
                    <button type="button" class="password-toggle" data-target="password" aria-label="Show password">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="password-input-wrap">
                    <input type="password" id="confirm_password" name="confirm_password" required>
                    <button type="button" class="password-toggle" data-target="confirm_password" aria-label="Show confirm password">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-signup">Sign Up</button>
        </form>

        <div class="signin-row">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>

    <script>
        document.querySelectorAll('.password-toggle').forEach((btn) => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const icon = btn.querySelector('i');
                if (!input || !icon) return;

                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                icon.classList.toggle('fa-eye', !show);
                icon.classList.toggle('fa-eye-slash', show);
            });
        });
    </script>
</body>
</html>
